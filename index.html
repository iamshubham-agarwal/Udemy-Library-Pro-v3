<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Udemy Library Pro v3</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
<div class="brand"><h1>📚 Udemy Library Pro</h1><p>Personal Learning Dashboard</p></div>
<div class="search-area"><input id="search" placeholder="Search courses..."></div>
</header>
<section id="stats" class="stats"></section>
<div class="container">
<aside class="sidebar"><div class="panel"><h2>Categories</h2><div id="cats"></div></div></aside>
<main class="content">
<div class="toolbar"><div><strong id="resultCount">0</strong> Courses</div><div class="actions"><select id="sort"><option value="title">Alphabetical</option><option value="rating">Highest Rating</option><option value="reviews">Most Reviews</option></select></div></div>
<div id="courses" class="course-grid"></div>
</main></div>
<script src="script.js"></script>
</body></html>
