<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Udemy Library Pro v3</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="topbar">

<div class="brand">

<h1>📚 Udemy Library Pro</h1>

<p>Your Personal Learning Dashboard</p>

</div>

<div class="search-area">

<input
id="search"
type="text"
placeholder="Search courses, instructors, category...">

</div>

</header>

<section id="stats" class="stats"></section>

<div class="container">

<aside class="sidebar">

<div class="panel">

<h2>Categories</h2>

<div id="cats"></div>

</div>

</aside>

<main class="content">

<div class="toolbar">

<div>

<strong id="resultCount">
0
</strong>

Courses

</div>

<div class="actions">

<select id="sort">

<option value="title">
Alphabetical
</option>

<option value="rating">
Highest Rating
</option>

<option value="reviews">
Most Reviews
</option>

<option value="progress">
Completion %
</option>

</select>

<button id="reset">

Reset

</button>

</div>

</div>

<div
id="courses"
class="course-grid">

</div>

</main>

</div>

<footer>

<div>

Udemy Library Pro v3

</div>

<div>

Powered by HTML • CSS • JavaScript

</div>

</footer>

<template id="course-template">

<div class="card">

<div class="card-header">

<h3 class="title"></h3>

<span class="category"></span>

</div>

<div class="meta">

<div>

👨‍🏫

<span class="instructor"></span>

</div>

<div>

⭐

<span class="rating"></span>

</div>

<div>

💬

<span class="reviews"></span>

</div>

<div>

⏱

<span class="length"></span>

</div>

<div>

📈

<span class="progress"></span>

</div>

</div>

<div class="buttons">

<a
class="open"
target="_blank">

Open Course

</a>

<button class="fav">

☆ Favorite

</button>

</div>

</div>

</template>

<script src="script.js"></script>

</body>

</html>
